name: Refresh voting data

# Wekelijks de stemdata verversen + handmatig te starten.
# De Statenvergadering (met de stemmingen) is vrijwel altijd op woensdag, dus we
# verversen donderdagochtend — de dag erna — zodat nieuwe stemmingen snel meegenomen worden.
on:
  schedule:
    - cron: "0 6 * * 4"   # elke donderdag 06:00 UTC (~08:00 NL)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run collector
        run: python collector/collect.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/utrecht.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh voting data"
            git push
          fi
